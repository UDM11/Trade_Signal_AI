app = 'trade-signal-ai'
primary_region = 'bom'

[build]

[env]
  PORT = "8080"

[deploy]
  strategy = "immediate"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "300s"
    interval     = "60s"
    method       = "GET"
    path         = "/api/health"
    timeout      = "20s"

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 25
    hard_limit = 50

[[vm]]
  memory   = "1024mb"
  cpu_kind = "shared"
  cpus     = 1
