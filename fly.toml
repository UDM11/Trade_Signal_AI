# ── Trade Signal AI — Single full-stack app ────────────────────────────────────
# Run from the PROJECT ROOT:  fly deploy
# Secrets: fly secrets set SUPABASE_URL=... SUPABASE_KEY=... OPENAI_API_KEY=... ALLOWED_ORIGINS=https://trade-signal-ai.fly.dev

app            = 'trade-signal-ai'
primary_region = 'bom'

[build]

[env]
  PORT = "8080"

[deploy]
  strategy = "immediate"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "30s"
    interval     = "30s"
    method       = "GET"
    path         = "/api/health"
    timeout      = "10s"

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 25
    hard_limit = 50

[[vm]]
  memory   = "1024mb"
  cpu_kind = "shared"
  cpus     = 1
