# fly.toml app configuration file generated for trade-signal-ai on 2026-04-17T23:23:35+05:45
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trade-signal-ai'
primary_region = 'bom'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
