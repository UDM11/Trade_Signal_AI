server {
    listen 8080;

    root  /usr/share/nginx/html;
    index index.html;

    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css application/json
        application/javascript text/javascript
        image/svg+xml application/font-woff2;

    # Long-lived cache for hashed Vite assets
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA — serve index.html for every unknown route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
