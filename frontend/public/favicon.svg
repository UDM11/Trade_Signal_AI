<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <rect width="48" height="48" rx="10" fill="#0f172a"/>
  <!-- Candlestick 1 (bearish, red) -->
  <line x1="12" y1="8" x2="12" y2="14" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="9" y="14" width="6" height="10" rx="1" fill="#ef4444"/>
  <line x1="12" y1="24" x2="12" y2="30" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Candlestick 2 (bullish, green) -->
  <line x1="24" y1="12" x2="24" y2="17" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="21" y="17" width="6" height="12" rx="1" fill="#22c55e"/>
  <line x1="24" y1="29" x2="24" y2="35" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Candlestick 3 (bullish, green) -->
  <line x1="36" y1="9" x2="36" y2="15" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="33" y="15" width="6" height="14" rx="1" fill="#22c55e"/>
  <line x1="36" y1="29" x2="36" y2="36" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Signal line -->
  <polyline points="6,38 12,32 20,26 28,20 42,12" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Signal dot -->
  <circle cx="42" cy="12" r="2.5" fill="#818cf8"/>
</svg>
